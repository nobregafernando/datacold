<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- BLOCO-SEM-CACHE:INICIO -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script>
/* DataCold · invalidação de cache agressiva.
 * Roda SÍNCRONO no <head>, antes de qualquer outro <script>. Em mudança
 * de build, força hard reload UMA VEZ (sem ficar em loop infinito).
 */
(function(){
  try {
    // 1) Mata Service Workers antigos (legado PWA, residual de versões antigas).
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(rs){
        rs.forEach(function(r){ r.unregister(); });
      }).catch(function(){});
    }
    // 2) Apaga TODAS as caches da Cache API (PWA, fetch interceptado, etc).
    if ('caches' in window) {
      caches.keys().then(function(ks){
        ks.forEach(function(k){ caches.delete(k); });
      }).catch(function(){});
    }
    // 3) Detecta build novo e força hard reload (uma única vez por nova build).
    //    Sessão fica intacta (datacold_sessao, datacold_jwt) — só recarrega assets.
    fetch('/versao.json?_=' + Date.now(), { cache: 'no-store' })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(v){
        if (!v || !v.build_id) return;
        var anterior = localStorage.getItem('__build_id');
        var marcador = '__reloaded_' + v.build_id;
        localStorage.setItem('__build_id', v.build_id);
        if (anterior && anterior !== v.build_id && !sessionStorage.getItem(marcador)) {
          // Build mudou — limpa marcadores antigos e força reload sem cache.
          Object.keys(sessionStorage).forEach(function(k){
            if (k.indexOf('__reloaded_') === 0 || k.indexOf('cache:') === 0) {
              sessionStorage.removeItem(k);
            }
          });
          sessionStorage.setItem(marcador, '1');
          // Adiciona ?_v=<build> na URL atual pra furar memory cache do Chrome.
          var url = new URL(location.href);
          url.searchParams.set('_v', v.build_id);
          location.replace(url.toString());
        }
      })
      .catch(function(){});
  } catch (_) {}
})();
</script>
<!-- BLOCO-SEM-CACHE:FIM -->

<link rel="icon" type="image/png" sizes="32x32" href="https://fcverbceppwdbveustvq.supabase.co/storage/v1/object/public/branding/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="../../../estilos/global.css?v=1779655008811">
<link rel="stylesheet" href="../../../scripts/componentes/MenuLateral.css?v=1779655008811">
<link rel="stylesheet" href="../../../scripts/componentes/MenuTopo.css?v=1779655008811">
<link rel="stylesheet" href="estilo.css?v=1779655008811">
</head>
<body>

<div class="layout-admin">
  <aside class="menu-lateral" id="menu-lateral" aria-label="navegação principal"></aside>

  <main class="usuarios-main">
    <div id="menu-topo"></div>

    <header class="usuarios-header">
      <div>
        <span class="olho">Administração de acesso</span>
        <h1>Usuários</h1>
        <p>Quem tem acesso ao painel e com qual papel.</p>
      </div>
      <button class="btn btn-primario btn-grande" data-acao="abrir-convite">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Convidar usuário
      </button>
    </header>

    <section class="usuarios-stats" data-stats>
      <div class="us-stat">
        <span class="us-stat-num" data-stat-total>—</span>
        <span class="us-stat-rotulo">total</span>
      </div>
      <div class="us-stat us-stat-admin">
        <span class="us-stat-num" data-stat-admin>—</span>
        <span class="us-stat-rotulo">administradores</span>
      </div>
      <div class="us-stat us-stat-op">
        <span class="us-stat-num" data-stat-op>—</span>
        <span class="us-stat-rotulo">operadores</span>
      </div>
      <div class="us-stat us-stat-inativos">
        <span class="us-stat-num" data-stat-inativos>—</span>
        <span class="us-stat-rotulo">desativados</span>
      </div>
    </section>

    <section class="usuarios-lista" data-lista>
      <div class="usuarios-loading">Carregando usuários…</div>
    </section>
  </main>
</div>

<!-- Modal de ação genérico (desativar/reativar/recovery/deletar) -->
<div class="modal-conv modal-acao" data-modal-acao hidden></div>

<!-- Toast de feedback -->
<div class="us-toast" data-toast hidden></div>

<!-- Modal de convite -->
<div class="modal-conv" data-modal hidden>
  <div class="modal-conv-overlay" data-fechar-modal></div>
  <div class="modal-conv-card" role="dialog" aria-modal="true" aria-labelledby="tit-conv">
    <header class="modal-conv-head">
      <h2 id="tit-conv">Convidar usuário</h2>
      <button class="modal-fechar" data-fechar-modal aria-label="Fechar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </header>

    <p class="modal-conv-sub">
      O convidado recebe um e-mail e define o próprio nome e senha.
      <strong>Você nunca verá a senha dele.</strong>
    </p>

    <form class="modal-conv-form" data-form novalidate>
      <label class="campo">
        <span>E-mail</span>
        <input type="email" name="email" autocomplete="off" required maxlength="254" placeholder="convidado@empresa.com">
      </label>

      <label class="campo">
        <span>Papel</span>
        <select name="papel" required>
          <option value="operador">Operador (somente leitura)</option>
          <option value="admin">Administrador (acesso total)</option>
        </select>
      </label>

      <div class="conta-erro" data-erro hidden></div>
      <div class="conta-ok"   data-ok   hidden></div>

      <div class="modal-conv-acoes">
        <button type="button" class="btn btn-ghost" data-fechar-modal>Cancelar</button>
        <button type="submit" class="btn btn-primario" data-btn-convidar>Enviar convite</button>
      </div>
    </form>
  </div>
</div>
