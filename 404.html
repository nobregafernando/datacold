<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- BLOCO-SEM-CACHE:INICIO -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script>
(function(){
  // 1) Desregistra qualquer Service Worker antigo (PWA residual)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(rs){
      rs.forEach(function(r){ r.unregister(); });
    }).catch(function(){});
  }
  // 2) Apaga todas as caches da Cache API
  if ('caches' in window) {
    caches.keys().then(function(ks){
      ks.forEach(function(k){ caches.delete(k); });
    }).catch(function(){});
  }
  // 3) Se detectar build novo, limpa storages voláteis e recarrega forte
  try {
    fetch('/versao.json?t=' + Date.now(), { cache: 'no-store' })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(v){
        if (!v || !v.build_id) return;
        var anterior = localStorage.getItem('__build_id');
        if (anterior && anterior !== v.build_id) {
          // Limpa apenas chaves marcadas como voláteis pra não derrubar sessão
          Object.keys(sessionStorage).forEach(function(k){
            if (k.indexOf('cache:') === 0) sessionStorage.removeItem(k);
          });
        }
        localStorage.setItem('__build_id', v.build_id);
      })
      .catch(function(){});
  } catch (_) {}
})();
</script>
<!-- BLOCO-SEM-CACHE:FIM -->
<title>DataCold - Rota fora do mapa</title>
<meta name="description" content="A rota acessada nao foi encontrada na plataforma DataCold.">

<body>

<div class="erro-fundo" aria-hidden="true"></div>

<main class="erro404">

    <img src="/assets/logo/01-primary-logo.png" alt="DataCold">

  <section class="erro-card" aria-labelledby="titulo-erro">
    <span class="erro-codigo">404</span>
    <h1 id="titulo-erro">Ops, essa rota saiu do freezer.</h1>

      Nao encontramos esse caminho na DataCold. Ele pode ter sido movido,
      digitado errado ou simplesmente ainda nao existir no painel.
    </p>

      <a href="/" class="btn btn-primario btn-grande">

          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </a>
      <a href="/paginas/login/" class="btn btn-ghost btn-grande">Abrir painel</a>
    </div>
  </section>
</main>

<script>
(function(){
  // Sinaliza "pronto" só após carregar tudo (img + fontes) — dispara o
  // fade-in do CSS (body.erro-pronto). Fallback duro em 2.5s pra não
  // deixar o texto invisível caso algum recurso fique pendurado.
  var pronto = false;
  function sinalizar(){
    if (pronto) return;
    pronto = true;
    document.body.classList.add('erro-pronto');
  }
  var pLoad  = new Promise(function(r){
    if (document.readyState === 'complete') r();
    else window.addEventListener('load', r, { once: true });
  });
  var pFonts = (document.fonts && document.fonts.ready) || Promise.resolve();
  Promise.all([pLoad, pFonts]).then(sinalizar);
  setTimeout(sinalizar, 2500);
})();
</script>
