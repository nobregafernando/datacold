<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- BLOCO-SEM-CACHE:INICIO -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script>
/* DataCold · invalidação de cache agressiva.
 * Roda SÍNCRONO no <head>, antes de qualquer outro <script>. Em mudança
 * de build, força hard reload UMA VEZ (sem ficar em loop infinito).
 */
(function(){
  try {
    // 1) Mata Service Workers antigos (legado PWA, residual de versões antigas).
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(rs){
        rs.forEach(function(r){ r.unregister(); });
      }).catch(function(){});
    }
    // 2) Apaga TODAS as caches da Cache API (PWA, fetch interceptado, etc).
    if ('caches' in window) {
      caches.keys().then(function(ks){
        ks.forEach(function(k){ caches.delete(k); });
      }).catch(function(){});
    }
    // 3) Detecta build novo e força hard reload (uma única vez por nova build).
    //    Sessão fica intacta (datacold_sessao, datacold_jwt) — só recarrega assets.
    fetch('/versao.json?_=' + Date.now(), { cache: 'no-store' })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(v){
        if (!v || !v.build_id) return;
        var anterior = localStorage.getItem('__build_id');
        var marcador = '__reloaded_' + v.build_id;
        localStorage.setItem('__build_id', v.build_id);
        if (anterior && anterior !== v.build_id && !sessionStorage.getItem(marcador)) {
          // Build mudou — limpa marcadores antigos e força reload sem cache.
          Object.keys(sessionStorage).forEach(function(k){
            if (k.indexOf('__reloaded_') === 0 || k.indexOf('cache:') === 0) {
              sessionStorage.removeItem(k);
            }
          });
          sessionStorage.setItem(marcador, '1');
          // Adiciona ?_v=<build> na URL atual pra furar memory cache do Chrome.
          var url = new URL(location.href);
          url.searchParams.set('_v', v.build_id);
          location.replace(url.toString());
        }
      })
      .catch(function(){});
  } catch (_) {}
})();
</script>
<!-- BLOCO-SEM-CACHE:FIM -->
<title>Datacold · Dashboard</title>
<style>
  :root{
    --bg:#f4f6fb;
    --panel:#ffffff;
    --panel2:#f1f4fa;
    --txt:#0f172a;
    --muted:#5b6b86;
    --border:#dde4ef;
    --accent:#1f6feb;
    --ok:#16a34a;
    --warn:#d97706;
    --danger:#dc2626;
    --energia:#1f6feb;
    --temp:#d97706;
    --porta:#16a34a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.5;
    display:grid;grid-template-columns:280px 1fr;grid-template-rows:auto 1fr;
    height:100vh;overflow:hidden;
  }

  /* ============ TOP BAR ============ */
  .topbar{
    grid-column:1/-1;background:var(--panel);border-bottom:1px solid var(--border);
    padding:12px 20px;display:flex;align-items:center;gap:16px;
  }
  .brand{font-weight:700;font-size:16px;letter-spacing:-.3px}
  .brand small{color:var(--muted);font-weight:400;font-size:12px;margin-left:8px}
  .top-spacer{flex:1}
  .top-section{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .top-section label{font-size:11px;text-transform:uppercase;letter-spacing:.6px}
  .top-section input{
    border:1px solid var(--border);border-radius:6px;padding:6px 10px;
    font-family:ui-monospace,monospace;font-size:11px;background:var(--panel2);
  }
  .key-input{width:260px}
  .key-input:focus{outline:none;border-color:var(--accent);background:#fff}

  .range-bar{display:flex;gap:4px}
  .range-bar button{
    padding:6px 10px;border:1px solid var(--border);border-radius:6px;
    background:var(--panel);font-size:11px;cursor:pointer;font-family:ui-monospace,monospace;color:var(--txt);
  }
  .range-bar button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .range-bar button:hover:not(.active){border-color:var(--accent);color:var(--accent)}

  .status-pill{
    display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
    background:var(--panel2);font-size:11px;font-weight:600;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:#cbd2dc}
  .dot.ok{background:var(--ok);box-shadow:0 0 0 3px rgba(22,163,74,.18)}
  .dot.err{background:var(--danger);box-shadow:0 0 0 3px rgba(220,38,38,.18)}

  /* ============ SIDEBAR ============ */
  .sidebar{
    background:var(--panel);border-right:1px solid var(--border);
    overflow-y:auto;padding:14px 12px;
  }
  .side-title{
    font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);
    font-weight:700;margin:0 0 10px;padding-left:6px;
  }
  .filter-row{display:flex;gap:4px;margin-bottom:14px;padding:0 4px}
  .filter-row button{
    flex:1;padding:5px 8px;border-radius:6px;border:1px solid var(--border);
    background:var(--panel);font-size:10px;cursor:pointer;color:var(--muted);
    font-weight:600;letter-spacing:.3px;text-transform:uppercase;
  }
  .filter-row button.active{background:var(--txt);color:#fff;border-color:var(--txt)}

  /* === CACHE STATUS === */
  .cache-status{
    display:flex;align-items:center;gap:8px;margin:0 4px 14px;padding:8px 10px;
    border:1px solid var(--border);border-radius:8px;font-size:11px;color:var(--muted);
    background:var(--panel);line-height:1.3;
  }
  .cache-status .cs-dot{width:8px;height:8px;border-radius:50%;background:#94a3b8;flex-shrink:0}
  .cache-status.loading .cs-dot{background:#1f6feb;animation:cs-pulse 1.2s ease-in-out infinite}
  .cache-status.ready .cs-dot{background:#16a34a}
  .cache-status.err .cs-dot{background:#dc2626}
  .cache-status .cs-txt{flex:1;min-width:0}
  .cache-status .cs-txt strong{color:var(--txt);font-weight:700}
  .cache-status .cs-refresh{
    background:transparent;border:1px solid var(--border);border-radius:6px;
    padding:3px 7px;font-size:10px;cursor:pointer;color:var(--muted);
    font-weight:600;letter-spacing:.3px;text-transform:uppercase;
  }
  .cache-status .cs-refresh:hover{color:var(--txt);border-color:var(--txt)}
  .cache-status .cs-refresh:disabled{opacity:.5;cursor:wait}
  @keyframes cs-pulse{0%,100%{opacity:1}50%{opacity:.35}}

  .group-label{
    font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
    padding:10px 8px 4px;font-weight:700;
  }
  .sensor-item{
    display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;
    cursor:pointer;transition:background .12s;margin-bottom:2px;
  }
  .sensor-item:hover{background:var(--panel2)}
  .sensor-item.active{background:rgba(31,111,235,.10);border-left:3px solid var(--accent);padding-left:7px}
  .sensor-dot{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
  }
  .sensor-dot.energia    {background:var(--energia)}
  .sensor-dot.temperatura{background:var(--temp)}
  .sensor-dot.porta      {background:var(--porta)}
  .sensor-info{flex:1;min-width:0}
  .sensor-info .nm{font-size:12px;font-weight:600;line-height:1.2}
  .sensor-info .id{font-family:ui-monospace,monospace;font-size:10px;color:var(--muted);line-height:1.2}
  .sensor-status{font-size:9px;text-transform:uppercase;letter-spacing:.4px;padding:2px 5px;border-radius:3px;font-weight:600}
  .sensor-status.ativo{background:rgba(22,163,74,.12);color:var(--ok)}
  .sensor-status.historico{background:rgba(217,119,6,.12);color:var(--warn)}

  /* ============ MAIN ============ */
  .main{
    overflow-y:auto;padding:20px 24px 60px;
  }

  .placeholder{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:80%;color:var(--muted);text-align:center;
  }
  .placeholder .big{font-size:48px;font-weight:200;color:#cbd2dc;line-height:1;margin-bottom:14px}
  .placeholder h2{margin:0 0 6px;font-size:18px;color:var(--txt);font-weight:600}
  .placeholder p{margin:0;font-size:13px;max-width:360px}

  .src-banner{
    background:rgba(31,111,235,.06);border:1px solid rgba(31,111,235,.30);
    border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:12px;
    display:flex;align-items:center;gap:10px;
  }
  .src-banner .icon{
    width:24px;height:24px;border-radius:50%;background:var(--accent);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0;
  }
  .src-banner strong{color:var(--accent)}
  .src-banner .meta{color:var(--muted);margin-left:auto;font-family:ui-monospace,monospace;font-size:11px}

  .sensor-header{
    display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px;flex-wrap:wrap;
  }
  .inline-range{flex-shrink:0;text-align:right}
  .inline-range .ir-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .inline-range .ir-hint{font-size:10px;color:var(--muted);margin-top:6px;font-style:italic}
  .sensor-header h1{margin:0 0 4px;font-size:24px;letter-spacing:-.4px}
  .sensor-header .sub{margin:0;color:var(--muted);font-size:13px}
  .sensor-header .badges{display:flex;gap:6px;margin-top:8px}
  .badge{
    display:inline-block;padding:3px 9px;border-radius:6px;font-size:10px;
    font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  }
  .badge.energia    {background:rgba(31,111,235,.10);color:var(--energia)}
  .badge.temperatura{background:rgba(217,119,6,.10);color:var(--temp)}
  .badge.porta      {background:rgba(22,163,74,.10);color:var(--porta)}
  .badge.grp{background:var(--panel2);color:var(--muted);border:1px solid var(--border)}

  .kpi-row{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px;
  }
  .kpi{
    background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:14px 16px;
  }
  .kpi .l{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .kpi .v{font-size:24px;font-weight:800;line-height:1.1;letter-spacing:-.5px}
  .kpi .sub{font-size:11px;color:var(--muted);margin-top:3px}
  .kpi.ok .v{color:var(--ok)}
  .kpi.warn .v{color:var(--warn)}
  .kpi.danger .v{color:var(--danger)}

  .panel{
    background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:16px 18px;margin-bottom:14px;
  }
  .panel h3{margin:0 0 12px;font-size:13px;font-weight:600}
  .panel h3 .hint{color:var(--muted);font-weight:400;margin-left:8px;font-size:11px}

  .chart-wrap{position:relative;height:240px}

  .table-wrap{max-height:300px;overflow:auto;border:1px solid var(--border);border-radius:6px}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th,td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
  th{background:var(--panel2);color:var(--muted);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0}
  td.num{font-family:ui-monospace,monospace;text-align:right}
  td.ts{font-family:ui-monospace,monospace;color:var(--muted);font-size:10px}

  .loading{
    display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:40px;justify-content:center;
  }
  .spinner{
    width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);
    border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .err-box{
    background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.30);border-radius:8px;
    padding:12px 14px;color:var(--danger);font-size:13px;
  }

  .empty-data{padding:30px;text-align:center;color:var(--muted);font-size:13px}

  /* mobile: hide sidebar (out of scope para hackathon, mas evita bug) */
  @media (max-width:760px){
    body{grid-template-columns:1fr}
    .sidebar{display:none}
  }

  /* === INVESTIGAÇÃO === */
  .invest-launcher{
    display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;
    background:linear-gradient(135deg, #1f6feb, #7c3aed);color:#fff;cursor:pointer;
    margin:0 4px 16px;transition:transform .12s;
  }
  .invest-launcher:hover{transform:translateY(-1px)}
  .invest-icon{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.22);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
  .invest-title{font-size:13px;font-weight:700;line-height:1.1}
  .invest-sub{font-size:10px;opacity:.85}

  .invest-summary{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px;
  }
  .invest-summary .item{
    background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;
  }
  .invest-summary .item.crit{border-color:rgba(220,38,38,.5);background:rgba(220,38,38,.04)}
  .invest-summary .item.warn{border-color:rgba(217,119,6,.5);background:rgba(217,119,6,.04)}
  .invest-summary .item.ok  {border-color:rgba(22,163,74,.5);background:rgba(22,163,74,.04)}
  .invest-summary .v{font-size:28px;font-weight:800;line-height:1}
  .invest-summary .item.crit .v{color:var(--danger)}
  .invest-summary .item.warn .v{color:var(--warn)}
  .invest-summary .item.ok   .v{color:var(--ok)}
  .invest-summary .l{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-top:4px;font-weight:700}

  .sensor-finding{
    background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:16px 18px;margin-bottom:12px;border-left:4px solid var(--border);
  }
  .sensor-finding.crit{border-left-color:var(--danger)}
  .sensor-finding.warn{border-left-color:var(--warn)}
  .sensor-finding.info{border-left-color:var(--accent)}
  .sensor-finding.ok{border-left-color:var(--ok)}
  .sf-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;flex-wrap:wrap}
  .sf-title{font-size:15px;font-weight:700}
  .sf-title .id{font-family:ui-monospace,monospace;font-weight:400;color:var(--muted);font-size:11px;margin-left:8px}
  .sf-head .right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .sf-flag{
    padding:3px 10px;border-radius:6px;font-size:10px;font-weight:800;
    letter-spacing:.6px;text-transform:uppercase;
  }
  .sf-flag.crit{background:rgba(220,38,38,.12);color:var(--danger)}
  .sf-flag.warn{background:rgba(217,119,6,.12);color:var(--warn)}
  .sf-flag.info{background:rgba(31,111,235,.10);color:var(--accent)}
  .sf-flag.ok  {background:rgba(22,163,74,.12);color:var(--ok)}
  .sf-issue{
    display:grid;grid-template-columns:60px 1fr;gap:12px;padding:8px 0;
    border-bottom:1px solid var(--border);align-items:flex-start;
  }
  .sf-issue:last-child{border-bottom:none}
  .sf-sev{
    padding:2px 7px;border-radius:5px;font-size:9px;font-weight:800;
    letter-spacing:.5px;text-transform:uppercase;text-align:center;
  }
  .sf-sev.crit{background:rgba(220,38,38,.12);color:var(--danger)}
  .sf-sev.warn{background:rgba(217,119,6,.12);color:var(--warn)}
  .sf-sev.info{background:rgba(31,111,235,.10);color:var(--accent)}
  .sf-q{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:3px}
  .sf-msg{font-size:13px;color:var(--txt)}
  .sf-metrics{
    margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);
    display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:var(--muted);
  }
  .sf-metrics span{font-family:ui-monospace,monospace;color:var(--txt)}
  .sf-window{font-size:10px;color:var(--muted);font-family:ui-monospace,monospace;margin-top:4px}

  /* === IDEAL PARAMS === */
  .ideal-card{
    background:linear-gradient(135deg, rgba(31,111,235,.04), rgba(124,58,237,.04));
    border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px;
    border-left:4px solid var(--accent);
  }
  .ideal-card h3{margin:0 0 12px;font-size:14px;font-weight:700;letter-spacing:-.2px}
  .ideal-card h3 .hint{color:var(--muted);font-weight:400;font-size:11px;margin-left:8px}
  .ideal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
  .ideal-item{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
  .ideal-item .ip-label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700}
  .ideal-item .ip-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;border-top:1px dashed var(--border);padding-top:8px}
  .ideal-item .ip-col .ip-tag{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:3px}
  .ideal-item .ip-col .ip-val{font-family:ui-monospace,monospace;font-size:14px;font-weight:700;line-height:1.2}
  .ideal-item .ip-ideal .ip-val{color:var(--accent)}
  .ideal-item .ip-medido .ip-val.ok  {color:var(--ok)}
  .ideal-item .ip-medido .ip-val.warn{color:var(--warn)}
  .ideal-item .ip-medido .ip-val.crit{color:var(--danger)}
  .ideal-item .ip-medido .ip-val.info{color:var(--accent)}
  .ideal-item .ip-medido .ip-val.muted{color:var(--muted)}
  .ideal-item .ip-status{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:5px}
  .ideal-item .ip-status.ok  {background:rgba(22,163,74,.12);color:var(--ok)}
  .ideal-item .ip-status.warn{background:rgba(217,119,6,.12);color:var(--warn)}
  .ideal-item .ip-status.crit{background:rgba(220,38,38,.12);color:var(--danger)}
  .ideal-item .ip-status.info{background:rgba(31,111,235,.10);color:var(--accent)}
  .ideal-source{font-size:10px;color:var(--muted);font-style:italic;margin-top:10px}

  /* === SENSOR ILLUSTRATION === */
  .sensor-illu{
    display:flex;align-items:center;gap:14px;margin-bottom:14px;
    background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;
  }
  .sensor-illu svg{flex-shrink:0}
  .sensor-illu .descr{font-size:13px;color:var(--muted)}
  .sensor-illu .descr strong{color:var(--txt)}

  /* === Q&A === */
  .qa-card{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:18px 20px;margin-bottom:14px;
  }
  .qa-card h3{margin:0 0 4px;font-size:14px;font-weight:700}
  .qa-card .sub{margin:0 0 14px;font-size:12px;color:var(--muted)}
  .qa-item{
    display:grid;grid-template-columns:90px 1fr;gap:12px;padding:10px 0;
    border-bottom:1px solid var(--border);
  }
  .qa-item:last-child{border-bottom:none}
  .qa-status{
    padding:3px 8px;border-radius:5px;font-size:10px;font-weight:800;
    letter-spacing:.5px;text-transform:uppercase;text-align:center;height:fit-content;
  }
  .qa-status.crit{background:rgba(220,38,38,.12);color:var(--danger)}
  .qa-status.warn{background:rgba(217,119,6,.12);color:var(--warn)}
  .qa-status.ok  {background:rgba(22,163,74,.12);color:var(--ok)}
  .qa-status.info{background:rgba(31,111,235,.10);color:var(--accent)}
  .qa-q{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:4px}
  .qa-a{font-size:13px;color:var(--txt)}
  .qa-item .qa-diag{
    margin-top:8px;padding:8px 10px;border-radius:6px;
    background:rgba(31,111,235,.06);border-left:3px solid var(--accent);
    font-size:12px;color:var(--txt);
  }
  .qa-item .qa-diag strong{color:var(--accent)}

</style>

  <div class="brand">Datacold <small>· dashboard da API BEM</small></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const API_BASE = "https://desafio.beminteligencia.com.br";
const KEY_STORAGE = "datacold_api_key";

// ============ CACHE LOCAL ============
const DATA_CACHE_KEY = "datacold_api_data_cache_v1";
const CACHE_TTL_MS = 30 * 60 * 1000;          // 30 min
const PREFETCH_LIMIT = 20000;                  // pega tudo que a API devolver
const PREFETCH_CONCURRENCY = 3;                // requisições em paralelo
const WINDOW_ATIVO = { start: "-167h", stop: "now" };           // 7d (limite da API)
const WINDOW_HISTORICO = { start: "-334h", stop: "-167h" };     // janela 7d-14d atrás

let dataCache = { fetchedAt: 0, data: {} };

const $ = (id)=>document.getElementById(id);
let sensors=[], groups=[];
let currentFilter="todos";
let currentSensor=null;
let currentRange="-1h";
let charts=[];

// ============ HELPERS DE CACHE ============
function loadCacheFromStorage(){
  try{
    const raw = localStorage.getItem(DATA_CACHE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || parsed.v !== 1) return null;
    return parsed;
  }catch(e){ return null; }
}

function saveCacheToStorage(){
  try{
    localStorage.setItem(DATA_CACHE_KEY, JSON.stringify({
      v: 1, fetchedAt: dataCache.fetchedAt, data: dataCache.data
    }));
    return true;
  }catch(e){
    console.warn("Cache não coube em localStorage; mantendo apenas em memória.", e);
    return false;
  }
}

function setCacheStatus(state, html){
  const el = $("cacheStatus");
  if(!el) return;
  el.className = "cache-status " + (state || "");
  el.querySelector(".cs-txt").innerHTML = html;
}

function formatAge(ms){
  const s = Math.max(0, Math.floor((Date.now()-ms)/1000));
  if(s < 60)  return "agora mesmo";
  const m = Math.floor(s/60);
  if(m < 60)  return `há ${m} min`;
  const h = Math.floor(m/60);
  return `há ${h}h${m%60 ? ` ${m%60}min` : ""}`;
}

function parseRangeMs(r){
  const m = String(r).match(/^-(\d+(?:\.\d+)?)(m|h|d)$/);
  if(!m) return null;
  const mul = m[2]==="m" ? 60e3 : m[2]==="h" ? 3600e3 : 86400e3;
  return parseFloat(m[1]) * mul;
}

function sliceCachedData(cached, range){
  // Histórico = janela fixa antiga, devolve tudo (filtrar por "-1h" não faz sentido)
  if(cached._isHistorico) return cached;
  const span = parseRangeMs(range);
  if(!span) return cached;
  const cutoff = Date.now() - span;
  const points = cached.points.filter(p => new Date(p.time).getTime() >= cutoff);
  return { ...cached, points, count: points.length };
}

async function fetchSensorData(sensor, key){
  const win = sensor.status === "historico" ? WINDOW_HISTORICO : WINDOW_ATIVO;
  const url = `${API_BASE}/api/v1/data?sensor=${sensor.id}`
            + `&start=${encodeURIComponent(win.start)}`
            + `&stop=${encodeURIComponent(win.stop)}`
            + `&limit=${PREFETCH_LIMIT}`;
  const r = await fetch(url, { headers: {"X-API-Key": key} });
  if(!r.ok){
    const t = await r.text();
    throw new Error(`HTTP ${r.status} · ${t.substring(0,100)}`);
  }
  const json = await r.json();
  return { ...json, _window: win, _isHistorico: sensor.status === "historico" };
}

async function prefetchAllSensors({ force = false } = {}){
  const key = $("apiKey").value.trim();
  if(!key){
    setCacheStatus("err", "Cole a chave da API para cachear os dados");
    return;
  }
  if(!sensors.length){
    setCacheStatus("err", "Catálogo indisponível");
    return;
  }
  if(!force){
    const stored = loadCacheFromStorage();
    if(stored && (Date.now() - stored.fetchedAt < CACHE_TTL_MS)){
      dataCache = stored;
      const n = Object.keys(dataCache.data).length;
      setCacheStatus("ready",
        `<strong>${n}/${sensors.length} sensores</strong> em cache · ${formatAge(dataCache.fetchedAt)}`);
      return;
    }
  }

  const btn = $("cacheRefresh");
  if(btn) btn.disabled = true;
  const total = sensors.length;
  let done = 0, errors = 0;
  setCacheStatus("loading", `Pré-carregando <strong>0/${total}</strong> sensores…`);

  const fresh = {};
  const queue = [...sensors];
  async function worker(){
    while(queue.length){
      const s = queue.shift();
      try{
        fresh[s.id] = await fetchSensorData(s, key);
      }catch(e){
        errors++;
        console.warn("Falha em", s.id, e.message);
      }
      done++;
      setCacheStatus("loading",
        `Pré-carregando <strong>${done}/${total}</strong> sensores…`);
    }
  }
  await Promise.all(Array.from({length: PREFETCH_CONCURRENCY}, worker));

  dataCache = { fetchedAt: Date.now(), data: fresh };
  const persisted = saveCacheToStorage();
  const tail = persisted ? "" : " · só nesta aba (excedeu cota do disco)";
  if(errors){
    setCacheStatus("ready",
      `<strong>${total - errors}/${total} ok</strong> · ${errors} falharam · ${formatAge(dataCache.fetchedAt)}${tail}`);
  }else{
    setCacheStatus("ready",
      `<strong>${total} sensores</strong> em cache · ${formatAge(dataCache.fetchedAt)}${tail}`);
  }
  if(btn) btn.disabled = false;
}

// ============ INIT ============
async function init(){
  const saved = localStorage.getItem(KEY_STORAGE);
  if(saved) $("apiKey").value = saved;
  // se ainda não há nada salvo, mantém o default já no atributo value
  $("apiKey").addEventListener("change", async ()=>{
    localStorage.setItem(KEY_STORAGE, $("apiKey").value.trim());
    // chave nova invalida o cache e dispara nova pré-busca
    await prefetchAllSensors({ force: true });
    if(currentSensor) loadSensor(currentSensor.id);
  });

  // status
  try{
    const h = await fetch(`${API_BASE}/health`).then(r=>r.json());
    $("statusDot").classList.add("ok");
    $("statusText").textContent = h.demo_mode ? "API · modo demo" : "API · dados reais";
  }catch(e){
    $("statusDot").classList.add("err");
    $("statusText").textContent = "API offline";
  }

  // catálogo
  try{
    const d = await fetch(`${API_BASE}/api/v1/sensors`).then(r=>r.json());
    sensors = d.sensors;
    groups = d.groups;
    renderSidebar();
  }catch(e){
    $("sensorList").innerHTML = "<div class='err-box' style='margin:10px'>Erro ao carregar sensores.</div>";
    setCacheStatus("err", "Catálogo indisponível");
    return;
  }

  // filtros
  document.querySelectorAll("#filterRow button").forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll("#filterRow button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      currentFilter = b.dataset.filter;
      renderSidebar();
    };
  });

  // botão de recarregar o cache
  const btn = $("cacheRefresh");
  if(btn) btn.onclick = async ()=>{
    await prefetchAllSensors({ force: true });
    if(currentSensor) loadSensor(currentSensor.id);
  };

  // pré-carrega todos os 14 sensores e guarda em localStorage
  await prefetchAllSensors();
}

// ============ SIDEBAR ============
function renderSidebar(){
  const cont = $("sensorList");
  cont.innerHTML = "";
  const order = ["extrusao","camara_congelados","camara_estoque","graxaria","externo_campo_grande","externo_tres_lagoas"];
  order.forEach(gid=>{
    const grp = groups.find(g=>g.id===gid);
    if(!grp) return;
    const filtered = grp.sensors.filter(sid=>{
      const s = sensors.find(x=>x.id===sid);
      return currentFilter==="todos" || (s && s.type===currentFilter);
    });
    if(filtered.length===0) return;
    const lbl = document.createElement("div");
    lbl.className = "group-label";
    lbl.textContent = grp.label;
    cont.appendChild(lbl);
    filtered.forEach(sid=>{
      const s = sensors.find(x=>x.id===sid);
      if(!s) return;
      const item = document.createElement("div");
      item.className = "sensor-item" + (currentSensor && currentSensor.id===s.id ? " active" : "");
      item.innerHTML = `
        <span class="sensor-dot ${s.type}"></span>
        <div class="sensor-info"><div class="nm">${s.label}</div><div class="id">${s.id}</div></div>
        <span class="sensor-status ${s.status}">${s.status}</span>
      `;
      item.onclick = ()=>{
        currentSensor = s;
        renderSidebar();
        loadSensor(s.id);
      };
      cont.appendChild(item);
    });
  });
}

// ============ LOAD ============
async function loadSensor(sensorId){
  const key = $("apiKey").value.trim();
  const s = sensors.find(x=>x.id===sensorId);
  if(!s) return;

  if(!key){
    $("content").innerHTML = renderHeader(s, null) + `
      <div class="err-box">
        Cole sua <strong>X-API-Key</strong> no topo da tela. Sem ela, a API não devolve dados (mas o catálogo é público).
      </div>
    `;
    bindInlineRange();
    return;
  }

  // 1) tenta cache em memória
  let cached = dataCache.data[sensorId];

  // 2) se não tem (algum sensor falhou na pré-busca), busca só esse
  if(!cached){
    $("content").innerHTML = `
      <div class="src-banner">
        <div class="icon">!</div>
        <div><strong>Carregando…</strong> sensor <code>${sensorId}</code> fora do cache</div>
      </div>
      <div class="loading"><div class="spinner"></div> Buscando na API BEM…</div>
    `;
    try{
      cached = await fetchSensorData(s, key);
      dataCache.data[sensorId] = cached;
      saveCacheToStorage();
    }catch(e){
      $("content").innerHTML = renderHeader(s, null) + `<div class="err-box">Erro ao buscar dados: ${e.message}</div>`;
      bindInlineRange();
      return;
    }
  }

  // 3) fatia pela janela escolhida (cliente, sem nova requisição)
  const sliced = sliceCachedData(cached, currentRange);
  const win = cached._window || { start: currentRange, stop: "now" };
  render(s, sliced, win.start, win.stop);
}

function renderHeader(s, data){
  const grp = groups.find(g=>g.id===s.group);
  const fetchedAt = dataCache.fetchedAt
    ? new Date(dataCache.fetchedAt).toLocaleString("pt-BR")
    : new Date().toLocaleString("pt-BR");
  const fonte = dataCache.fetchedAt ? "Cache local da API BEM" : "API BEM ao vivo";
  const ranges = [
    {v:"-30m",  l:"30m"},
    {v:"-1h",   l:"1h"},
    {v:"-6h",   l:"6h"},
    {v:"-24h",  l:"24h"},
    {v:"-72h",  l:"3d"},
    {v:"-167h", l:"7d (máx)"},
  ];
  return `
    <div class="src-banner">
      <div class="icon">A</div>
      <div><strong>${fonte}</strong> · sensor <code>${s.id}</code></div>
      <div class="meta">pré-carregado em ${fetchedAt}${data ? ` · ${data.count} pontos no recorte` : ""}</div>
    </div>
    <div class="sensor-header">
      <div style="flex:1">
        <h1>${s.label}</h1>
        <p class="sub">${grp ? grp.description : ""}</p>
        <div class="badges">
          <span class="badge ${s.type}">${s.type}</span>
          <span class="badge grp">${grp ? grp.label : s.group}</span>
        </div>
      </div>
      <div class="inline-range">
        <div class="ir-label">Período</div>
        <div class="range-bar" id="inlineRange">
          ${ranges.map(r=>`<button data-start="${r.v}" ${r.v===currentRange?'class="active"':''}>${r.l}</button>`).join("")}
        </div>
        <div class="ir-hint">limite da API: até 168h por consulta</div>
      </div>
    </div>
  `;
}

function bindInlineRange(){
  const ir = document.getElementById("inlineRange");
  if(!ir) return;
  ir.querySelectorAll("button").forEach(b=>{
    b.onclick = ()=>{
      ir.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      currentRange = b.dataset.start;
      if(currentSensor) loadSensor(currentSensor.id);
    };
  });
}

// ============ RENDER ============
function render(s, data, start, stop){
  destroyCharts();
  let html = renderHeader(s, data);

  if(data.points.length === 0){
    html += `<div class="panel"><div class="empty-data">Sem dados nesse intervalo.<br>Tente uma janela maior (na barra do topo).</div></div>`;
    $("content").innerHTML = html;
    return;
  }

  // Ilustração + descrição
  html += `<div class="sensor-illu">${svgFor(s.type)}<div class="descr">${descricaoSensor(s.type)}</div></div>`;
  // Parâmetros ideais
  html += paramsIdeais(s, data);
  // KPIs
  const k = indicators(data);
  html += `<h3 style="font-size:13px;font-weight:700;margin:8px 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Métricas calculadas</h3>
  <div class="kpi-row">${k.map(it=>`
    <div class="kpi ${it.cls||''}">
      <div class="l">${it.label}</div>
      <div class="v">${it.value}</div>
      ${it.sub?`<div class="sub">${it.sub}</div>`:""}
    </div>`).join("")}</div>`;

  // Charts placeholder
  html += `<div id="chartsBox"></div>`;

  // Q&A
  html += qaSection(s.id);
  // Tabela
  html += `<div class="panel"><h3>Últimos pontos retornados<span class="hint">${data.count} linhas · janela ${start} → ${stop}</span></h3><div class="table-wrap">${buildTable(data)}</div></div>`;

  $("content").innerHTML = html;
  bindInlineRange();
  buildCharts(s, data);
}

function destroyCharts(){ charts.forEach(c=>c.destroy()); charts=[]; }

// ============ INDICADORES ============
function avg(a){return a.reduce((s,x)=>s+(+x||0),0)/a.length}

function indicators(data){
  const k=[];
  const pts = data.points;

  if(data.type === "energia"){
    const Ia=avg(pts.map(p=>p.corrente_fase_a)), Ib=avg(pts.map(p=>p.corrente_fase_b)), Ic=avg(pts.map(p=>p.corrente_fase_c));
    const Va=avg(pts.map(p=>p.tensao_fase_a)),   Vb=avg(pts.map(p=>p.tensao_fase_b)),   Vc=avg(pts.map(p=>p.tensao_fase_c));
    const FPa=avg(pts.map(p=>p.fator_potencia_a)),FPb=avg(pts.map(p=>p.fator_potencia_b)),FPc=avg(pts.map(p=>p.fator_potencia_c));
    const P_pts = pts.map(p =>
      (p.tensao_fase_a||0)*(p.corrente_fase_a||0)*(p.fator_potencia_a||0)
    + (p.tensao_fase_b||0)*(p.corrente_fase_b||0)*(p.fator_potencia_b||0)
    + (p.tensao_fase_c||0)*(p.corrente_fase_c||0)*(p.fator_potencia_c||0)
    );
    const P_kW = avg(P_pts)/1000;
    let kWh=0;
    for(let i=1;i<pts.length;i++){
      const dt = (new Date(pts[i].time) - new Date(pts[i-1].time))/1000;
      kWh += ((P_pts[i]+P_pts[i-1])/2) * dt;
    }
    kWh = kWh/3600/1000;
    k.push({label:"Potência média", value: P_kW.toFixed(2)+" kW"});
    k.push({label:"Energia estimada", value: kWh.toFixed(2)+" kWh", sub:"no intervalo"});
    k.push({label:"Pontos no intervalo", value: pts.length});
  }
  else if(data.type === "temperatura"){
    const vals = pts.map(p=>p.temperatura);
    const mean=avg(vals), min=Math.min(...vals), max=Math.max(...vals);
    k.push({label:"Temperatura média", value: mean.toFixed(2)+" °C"});
    k.push({label:"Mínima", value: min.toFixed(2)+" °C"});
    k.push({label:"Máxima", value: max.toFixed(2)+" °C"});
    k.push({label:"Amplitude", value: (max-min).toFixed(2)+" °C", sub:"max − min"});
    k.push({label:"Pontos no intervalo", value: pts.length});
  }
  else if(data.type === "porta"){
    const vals = pts.map(p=>p.abertura_porta);
    const mean=avg(vals), min=Math.min(...vals), max=Math.max(...vals);
    let trans=0;
    for(let i=1;i<vals.length;i++) if(Math.abs(vals[i]-vals[i-1]) > (max-min)/3) trans++;
    k.push({label:"Transições detectadas", value: trans, sub:"mudanças bruscas no sinal"});
    k.push({label:"Pontos no intervalo", value: pts.length});
  }
  return k;
}

// ============ CHARTS ============
function buildCharts(s, data){
  const box = $("chartsBox");
  box.innerHTML = "";
  const labels = data.points.map(p => new Date(p.time).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}));

  if(data.type === "energia"){
    addChart(box, "Corrente por fase (A)", labels, [
      {label:"Fase A", data:data.points.map(p=>p.corrente_fase_a), borderColor:"#1f6feb"},
      {label:"Fase B", data:data.points.map(p=>p.corrente_fase_b), borderColor:"#16a34a"},
      {label:"Fase C", data:data.points.map(p=>p.corrente_fase_c), borderColor:"#d97706"},
    ]);
    addChart(box, "Tensão por fase (V)", labels, [
      {label:"Fase A", data:data.points.map(p=>p.tensao_fase_a), borderColor:"#1f6feb"},
      {label:"Fase B", data:data.points.map(p=>p.tensao_fase_b), borderColor:"#16a34a"},
      {label:"Fase C", data:data.points.map(p=>p.tensao_fase_c), borderColor:"#d97706"},
    ]);
    addChart(box, "Fator de potência por fase", labels, [
      {label:"Fase A", data:data.points.map(p=>p.fator_potencia_a), borderColor:"#1f6feb"},
      {label:"Fase B", data:data.points.map(p=>p.fator_potencia_b), borderColor:"#16a34a"},
      {label:"Fase C", data:data.points.map(p=>p.fator_potencia_c), borderColor:"#d97706"},
      {label:"Limite ANEEL (0,92)", data:data.points.map(()=>0.92), borderColor:"#dc2626", borderDash:[6,4], pointRadius:0},
    ]);
    const P = data.points.map(p=>(
      (p.tensao_fase_a||0)*(p.corrente_fase_a||0)*(p.fator_potencia_a||0)
    + (p.tensao_fase_b||0)*(p.corrente_fase_b||0)*(p.fator_potencia_b||0)
    + (p.tensao_fase_c||0)*(p.corrente_fase_c||0)*(p.fator_potencia_c||0)
    )/1000);
    addChart(box, "Potência ativa total (kW)", labels, [
      {label:"P", data:P, borderColor:"#7c3aed", fill:true, backgroundColor:"rgba(124,58,237,.10)"},
    ]);
  }
  else if(data.type === "temperatura"){
    addChart(box, "Temperatura (°C)", labels, [
      {label:"Temperatura", data:data.points.map(p=>p.temperatura), borderColor:"#d97706", fill:true, backgroundColor:"rgba(217,119,6,.10)"},
    ]);
  }
  else if(data.type === "porta"){
    addChart(box, "Sinal de abertura (valor bruto)", labels, [
      {label:"abertura_porta", data:data.points.map(p=>p.abertura_porta), borderColor:"#16a34a", stepped:true},
    ]);
  }
}

function addChart(parent, title, labels, datasets){
  const wrap = document.createElement("div");
  wrap.className = "panel";
  wrap.innerHTML = `<h3>${title}</h3><div class="chart-wrap"><canvas></canvas></div>`;
  parent.appendChild(wrap);
  const ds = datasets.map(d=>({
    ...d,
    borderWidth: 1.8,
    pointRadius: 1.2,
    pointHoverRadius: 4,
    tension: 0.15,
    fill: d.fill || false,
  }));
  const ch = new Chart(wrap.querySelector("canvas"), {
    type: "line",
    data: { labels, datasets: ds },
    options: {
      responsive:true, maintainAspectRatio:false, interaction:{mode:"index", intersect:false},
      plugins: { legend: { position:"bottom", labels:{boxWidth:10, font:{size:11}, padding:10} } },
      scales: {
        x: { ticks: { maxTicksLimit: 7, font:{size:10}, color:"#5b6b86" }, grid:{color:"#eef1f7"} },
        y: { ticks: { font:{size:10}, color:"#5b6b86" }, grid:{color:"#eef1f7"} },
      },
    },
  });
  charts.push(ch);
}

// ============ TABLE ============
function buildTable(data){
  const cols = ["time", ...data.fields];
  let html = "<thead><tr>" + cols.map(c=>`<th>${c}</th>`).join("") + "</tr></thead><tbody>";
  data.points.slice(-50).reverse().forEach(p=>{
    html += "<tr>";
    cols.forEach(c=>{
      if(c==="time") html += `<td class="ts">${new Date(p[c]).toLocaleString("pt-BR")}</td>`;
      else html += `<td class="num">${typeof p[c]==="number" ? p[c].toFixed(3) : (p[c]??"—")}</td>`;
    });
    html += "</tr>";
  });
  html += "</tbody>";
  return html;
}

function paramsIdeais(s, data){
  const key = IDEAIS[s.id] ? s.id : (IDEAIS[s.type + "_default"] ? s.type + "_default" : null);
  if(!key) return "";
  const I = IDEAIS[key];

  // computar comparações onde for possível
  const cmp = {};
  if(data && data.points && data.points.length){
    const pts = data.points;
    const times = pts.map(p=>new Date(p.time));
    if(s.type === "energia"){
      const Ia=pts.reduce((s,p)=>s+p.corrente_fase_a,0)/pts.length;
      const Ib=pts.reduce((s,p)=>s+p.corrente_fase_b,0)/pts.length;
      const Ic=pts.reduce((s,p)=>s+p.corrente_fase_c,0)/pts.length;
      const Va=pts.reduce((s,p)=>s+p.tensao_fase_a,0)/pts.length;
      const Vb=pts.reduce((s,p)=>s+p.tensao_fase_b,0)/pts.length;
      const Vc=pts.reduce((s,p)=>s+p.tensao_fase_c,0)/pts.length;
      const FPa=pts.reduce((s,p)=>s+p.fator_potencia_a,0)/pts.length;
      const FPb=pts.reduce((s,p)=>s+p.fator_potencia_b,0)/pts.length;
      const FPc=pts.reduce((s,p)=>s+p.fator_potencia_c,0)/pts.length;
      const Imed=(Ia+Ib+Ic)/3, Vmed=(Va+Vb+Vc)/3;
      const CUB = Imed>0 ? Math.max(Math.abs(Ia-Imed),Math.abs(Ib-Imed),Math.abs(Ic-Imed))/Imed*100 : 0;
      const VUB = Vmed>0 ? Math.max(Math.abs(Va-Vmed),Math.abs(Vb-Vmed),Math.abs(Vc-Vmed))/Vmed*100 : 0;
      const FP = (FPa+FPb+FPc)/3;
      cmp.tensao_fase = {v: `medido ≈ ${Vmed.toFixed(1)} V`, cls: (Vmed>120&&Vmed<134)?"ok":(Vmed>50?"warn":"crit")};
      cmp.tensao_linha = {v: `medido ≈ ${Vmed.toFixed(1)} V (fase)`, cls: "info"};
      cmp.fp = {v: `medido = ${FP.toFixed(3)}`, cls: FP<0.85?"crit":FP<0.92?"warn":"ok"};
      cmp.cub = {v: `medido = ${CUB.toFixed(1)}%`, cls: CUB>10?"crit":CUB>5?"warn":"ok"};
      cmp.vub = {v: `medido = ${VUB.toFixed(2)}%`, cls: VUB>2?"crit":VUB>1?"warn":"ok"};
      const Imax = Math.max(...pts.map(p=>Math.max(p.corrente_fase_a,p.corrente_fase_b,p.corrente_fase_c)));
      if(Imed>0) cmp.pico = {v: `medido = ${(Imax/Imed).toFixed(1)}× a média`, cls: Imax/Imed>8?"warn":"ok"};
    }
    if(s.type === "temperatura"){
      const vals=pts.map(p=>p.temperatura);
      const m=vals.reduce((a,b)=>a+b,0)/vals.length;
      const sd=Math.sqrt(vals.reduce((s,v)=>s+(v-m)**2,0)/vals.length);
      cmp.std = {v: `medido = σ ${sd.toFixed(2)}°C`, cls: "ok"};
    }
    if(times.length>1){
      const deltas=[];
      for(let i=1;i<times.length;i++) deltas.push((times[i]-times[i-1])/1000);
      const dmean = deltas.reduce((a,b)=>a+b,0)/deltas.length;
      cmp.interval = {v: `medido = ${dmean.toFixed(0)}s médios`, cls: dmean>600?"warn":dmean>300?"info":"ok"};
    }
    if(s.type === "temperatura" && IDEAIS[s.id]){
      const ideal = IDEAIS[s.id].items.find(it=>it.check==="faixa");
      if(ideal){
        const oor = pts.filter(p=>p.temperatura<ideal.min || p.temperatura>ideal.max).length;
        const pct = oor/pts.length*100;
        cmp.faixa = {v: `${pct.toFixed(0)}% das leituras fora`, cls: pct>50?"crit":pct>10?"warn":"ok"};
        cmp.oor = {v: `${pct.toFixed(0)}% fora`, cls: pct>50?"crit":pct>10?"warn":"ok"};
      }
    }
  }

  const labelStatus = {ok:"normal",warn:"atenção",crit:"problema",info:"info"};
  return `<div class="ideal-card">
    <h3>${I.titulo} <span class="hint">valor ideal e valor medido pela API, lado a lado</span></h3>
    <div class="ideal-grid">
      ${I.items.map(it=>{
        const c = cmp[it.check];
        const measuredVal = c ? c.v.replace(/^medido\s*[=≈]\s*/i,'').trim() : "—";
        const measuredCls = c ? c.cls : "muted";
        const statusLabel = c ? (labelStatus[c.cls]||"") : "sem medida";
        return `<div class="ideal-item">
          <div class="ip-label">${it.label}</div>
          <div class="ip-row">
            <div class="ip-col ip-ideal">
              <div class="ip-tag">ideal</div>
              <div class="ip-val">${it.value}</div>
            </div>
            <div class="ip-col ip-medido">
              <div class="ip-tag">medido (API)</div>
              <div class="ip-val ${measuredCls}">${measuredVal}</div>
              ${statusLabel ? `<div class="ip-status ${measuredCls}">${statusLabel}</div>` : ""}
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>
    <div class="ideal-source">${I.fonte}</div>
  </div>`;
}

function qaSection(sid){
  const f = QA.find(x=>x.sensor === sid);
  if(!f || !f.questions || !f.questions.length) return "";
  const order = {crit:0, warn:1, ok:2, info:3};
  const sorted = [...f.questions].sort((a,b)=>(order[a.status]??9)-(order[b.status]??9));
  const counts = {crit:0, warn:0, ok:0, info:0};
  f.questions.forEach(q=>{ counts[q.status] = (counts[q.status]||0)+1; });
  return `<div class="qa-card">
    <h3>Perguntas respondidas pela análise</h3>
    <p class="sub">${f.questions.length} perguntas-guia avaliadas com base nos ${f.count} pontos do período. Crítico=${counts.crit||0} · atenção=${counts.warn||0} · normal=${counts.ok||0} · info=${counts.info||0}</p>
    ${sorted.map(q=>`
      <div class="qa-item">
        <div class="qa-status ${q.status}">${q.status==="crit"?"problema":q.status==="warn"?"atenção":q.status==="ok"?"normal":"info"}</div>
        <div>
          <div class="qa-q">${q.q}</div>
          <div class="qa-a">${q.answer}</div>
          ${q.diagnostico ? `<div class="qa-diag"><strong>Provável causa:</strong> ${q.diagnostico}</div>` : ""}
        </div>
      </div>
    `).join("")}
  </div>`;

function showInvestigation(){
  destroyCharts();
  currentSensor = null;
  document.querySelectorAll(".sensor-item").forEach(x=>x.classList.remove("active"));

  const nc = FINDINGS.filter(f=>f.issues.some(i=>i.sev==="crit")).length;
  const nw = FINDINGS.filter(f=>!f.issues.some(i=>i.sev==="crit") && f.issues.some(i=>i.sev==="warn")).length;
  const ni = FINDINGS.filter(f=>!f.issues.some(i=>["crit","warn"].includes(i.sev)) && f.issues.length>0).length;
  const ok = FINDINGS.filter(f=>f.issues.length===0).length;
  const totalIssues = FINDINGS.reduce((s,f)=>s+f.issues.length,0);

  let html = `
    <div class="src-banner">
      <div class="icon">!</div>
      <div><strong>Investigação automática</strong> · análise dos 14 sensores com base nas perguntas-guia</div>
      <div class="meta">${totalIssues} achados em ${FINDINGS.length} sensores</div>
    </div>
    <h1 style="margin:0 0 4px;font-size:24px;letter-spacing:-.4px">Achados por sensor</h1>
    <p style="color:var(--muted);font-size:13px;margin:0 0 18px">A análise abaixo foi gerada percorrendo cada sensor da API e respondendo as perguntas definidas no estudo. Vermelho = problema sério, amarelo = atenção, azul = observação.</p>

    <div class="invest-summary">
      <div class="item crit"><div class="v">${nc}</div><div class="l">Críticos</div></div>
      <div class="item warn"><div class="v">${nw}</div><div class="l">Atenção</div></div>
      <div class="item"><div class="v">${ni}</div><div class="l">Informativos</div></div>
      <div class="item ok"><div class="v">${ok}</div><div class="l">Sem achados</div></div>
    </div>
  `;

  // ordenar: críticos primeiro
  const sevOrder = {crit:0, warn:1, info:2};
  const sorted = [...FINDINGS].sort((a,b)=>{
    const sa = a.issues.length ? Math.min(...a.issues.map(i=>sevOrder[i.sev]??3)) : 99;
    const sb = b.issues.length ? Math.min(...b.issues.map(i=>sevOrder[i.sev]??3)) : 99;
    return sa - sb;
  });

  sorted.forEach(f=>{
    const topSev = f.issues.length ? f.issues.reduce((a,b)=>(sevOrder[a.sev]??9)<(sevOrder[b.sev]??9)?a:b).sev : "ok";
    const nc_ = f.issues.filter(i=>i.sev==="crit").length;
    const nw_ = f.issues.filter(i=>i.sev==="warn").length;
    const ni_ = f.issues.filter(i=>i.sev==="info").length;

    html += `<div class="sensor-finding ${topSev}">
      <div class="sf-head">
        <div>
          <div class="sf-title">${f.label} <span class="id">${f.sensor}</span></div>
          <div style="font-size:11px;color:var(--muted)">${f.group} · ${f.type}</div>
        </div>
        <div class="right">
          ${nc_?`<span class="sf-flag crit">${nc_} crítico${nc_>1?"s":""}</span>`:""}
          ${nw_?`<span class="sf-flag warn">${nw_} atenção</span>`:""}
          ${ni_?`<span class="sf-flag info">${ni_} info</span>`:""}
          ${!f.issues.length?`<span class="sf-flag ok">sem achados</span>`:""}
          <button class="btn ghost" onclick="loadSensor('${f.sensor}')" style="padding:4px 10px;font-size:11px">ver dados</button>
        </div>
      </div>`;

    f.issues.forEach(i=>{
      html += `<div class="sf-issue">
        <div class="sf-sev ${i.sev}">${i.sev==="crit"?"crítico":i.sev==="warn"?"atenção":"info"}</div>
        <div>
          ${i.q?`<div class="sf-q">${i.q}</div>`:""}
          <div class="sf-msg">${i.msg}</div>
        </div>
      </div>`;
    });

    // métricas resumo
    if(f.metrics){
      let m = "";
      if(f.type === "energia"){
        m = `<span>P=${f.metrics.Pmed_kW}kW</span> <span>kWh=${f.metrics.kWh}</span> <span>FP=${f.metrics.FP_composto}</span> <span>%CUB=${f.metrics.CUB}</span> <span>%VUB=${f.metrics.VUB}</span>`;
      }else if(f.type === "temperatura"){
        m = `<span>média=${f.metrics.mean}°C</span> <span>min=${f.metrics.min}°C</span> <span>max=${f.metrics.max}°C</span> <span>σ=${f.metrics.std}°C</span>`;
      }else if(f.type === "porta"){
        m = `<span>aberturas≈${f.metrics.opens_estimated}</span> <span>transições=${f.metrics.transitions}</span> <span>range=${f.metrics.min}→${f.metrics.max}</span>`;
      }
      if(m) html += `<div class="sf-metrics">${m}</div>`;
    }
    if(f.window) html += `<div class="sf-window">janela: ${f.window} · ${f.count} pontos</div>`;
    html += `</div>`;
  });

  $("content").innerHTML = html;
}

document.addEventListener("DOMContentLoaded", ()=>{
  const ib = document.getElementById("investBtn");
  if(ib) ib.onclick = showInvestigation;
});

// abrir investigação automaticamente ao carregar
window.addEventListener("load", ()=>{ setTimeout(showInvestigation, 200); });

</script>
</body>
</html>
